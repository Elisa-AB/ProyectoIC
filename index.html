    <style>

            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;

        .portada-container {

        .logo-utn {

            max-width: 450px;

        .seccion-datos ul {
            list-style-type: disc;
            padding-left: 20px;
            margin: 0;
        }

        .seccion-datos li {
            margin-bottom: 8px;

            font-weight: bold;
            font-size: 1.25rem;
            margin-top: 12px;
            margin-bottom: 25px;
            color: #000000;
