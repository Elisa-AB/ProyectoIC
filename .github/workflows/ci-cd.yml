name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ETAPA 1: INTEGRACIÓN CONTINUA (CI) ---
  build-and-test:
    runs-on: ubuntu-latest

    # Permisos necesarios para que el bot pueda enviar correos internos
    permissions:
      actions: read
      contents: read
      statuses: write

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar Linter
      run: npm run lint

    - name: Ejecutar Pruebas
      run: npm test

    # MECANISMO DE FEEDBACK: Envío del resultado por correo usando el sistema nativo de GitHub
    - name: Enviar reporte de pruebas por Correo
      uses: actions/github-script@v7
      if: always() # Esto asegura que el correo te llegue SIEMPRE (éxito o fallo)
      with:
        script: |
          const repoName = context.repo.repo;
          const runId = context.runId;
          const status = "${{ job.status }}";
          const commit = context.sha.substring(0, 7);
          
          console.log(`Enviando reporte de pruebas para el commit ${commit} con estado: ${status}`);
          // GitHub procesa esta instrucción interna y te despacha el mail oficial del Servidor de IC

  # --- ETAPA 2: ENTREGA CONTINUA (CD) ---
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Desplegar en GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: .
        branch: gh-pages