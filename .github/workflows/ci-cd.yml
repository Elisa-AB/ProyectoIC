name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ETAPA 1: INTEGRACIÓN CONTINUA (CI) ---
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Código: Descarga el código del repositorio al servidor de IC
    - name: Checkout del codigo
      uses: actions/checkout@v4

    # Entorno de desarrollo / Build: Configuramos Node.js para herramientas de calidad
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    # Build Automatizada: Instala el entorno base definido en el package.json
    - name: Instalar dependencias
      run: npm install

    # Inspección de código: Valida la sintaxis real en el package.json
    - name: Ejecutar Linter
      run: npm run lint

    # Pruebas automatizadas: Corre los tests funcionales (Spec-Driven Development)
    - name: Ejecutar Pruebas
      run: npm test

    # --- FEEDBACK EN CASO DE FALLA (Aplica para dev y main) ---
    - name: 🚨 Notificar Falla en Slack
      if: failure()
      uses: ravsamhq/notify-slack-action@v2
      with:
        status: ${{ job.status }}
        notification_title: "❌ ¡La etapa de Integración Continua ha fallado!"
        message_format: |
          *Descripción:* El pipeline de IC se ha detenido en el entorno de build.
          *Rama:* `${{ github.ref_name }}`
          *Autor del Cambio* @${{ github.actor }}
          *Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # --- ETAPA 2: ENTREGA CONTINUA (CD) ---
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    # FILTRO DE SEGURIDAD EXTREMO: Solo despliega si el cambio ocurre en la rama main
    if: github.ref == 'refs/heads/main'

    steps:
    # Despliegue Automatizado mediante Webhook guiado por CI hacia Render
    - name: Disparar el despliegue síncrono en Render
      run: |
        echo "Iniciando petición de despliegue hacia Render..."
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

    # --- FEEDBACK EN CASO DE ÉXITO (Solo producción) ---
    - name: 🎉 Notificar Éxito en Slack
      if: success()
      uses: ravsamhq/notify-slack-action@v2
      with:
        status: ${{ job.status }}
        notification_title: "🚀 ¡Despliegue Exitoso en Producción!"
        message_format: |
          *Descripción:* El artefacto pasó QA y se ordenó el despliegue a producción.
          *Rama:* `${{ github.ref_name }}`
          *Disparado por:* @${{ github.actor }}
          *Entorno Productivo:* https://proyectoic-elisa.onrender.com
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}