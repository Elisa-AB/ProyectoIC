name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ETAPA 1: INTEGRACIÓN CONTINUA (CI) ---
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Código: Descarga el código del repositorio al servidor de IC
    - name: Checkout del codigo
      uses: actions/checkout@v4

# === SUB-ETAPA: ANÁLISIS ESTÁTICO (FAIL FAST) ===
    - name: Validar sintaxis y estructura (HTML Linter)
      uses: htmlhint/action-htmlhint@v2.0.2  
      with:
        files: 'index.html' 
        
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Build Automatizada: Instala el entorno base definido en el package.json
    - name: Instalar dependencias
      run: npm install

    # Pruebas automatizadas: Corre los tests unitarios simulados
    - name: Ejecutar Pruebas
      run: npm test

    # --- FEEDBACK EN CASO DE FALLA EN LA INTEGRACIÓN ---
    - name: 🚨 Notificar Falla en Slack
      if: failure() # Solo se activa si la build o los tests fallan
      uses: ravsamhq/notify-slack-action@v2
      with:
        status: ${{ job.status }}
        notification_title: "❌ ¡La etapa de Integración Continua ha fallado!"
        message_format: |
          *Descripción:* La suite de pruebas dinámicas o la build del entorno han colapsado en el servidor de IC.
          *Rama:* `${{ github.ref_name }}`
          *Disparado por:* @${{ github.actor }}
          *Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # --- ETAPA 2: ENTREGA CONTINUA (CD) ---
  deploy:
    needs: build-and-test # Bloqueo de seguridad: Solo despliega si la etapa de CI dio verde
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    # Despliegue en Entorno de Entrega (GitHub Pages como entorno de Producción)
    - name: Desplegar en GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: . # Despliega la raíz del proyecto donde está tu index.html
        branch: gh-pages # Rama destino para el servidor web nativo

    # --- FEEDBACK EN CASO DE ÉXITO EN EL DESPLIEGUE ---
    - name: 🎉 Notificar Éxito en Slack
      if: success() # Solo se activa si el despliegue termina correctamente
      uses: ravsamhq/notify-slack-action@v2
      with:
        status: ${{ job.status }}
        notification_title: "🚀 ¡Despliegue Exitoso en Producción!"
        message_format: |
          *Descripción:* El artefacto de software ha pasado todas las aserciones de QA y se encuentra disponible en la web.
          *Rama:* `${{ github.ref_name }}`
          *Disparado por:* @${{ github.actor }}
          *Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>
          *URL de Producción:* https://elisa-ab.github.io/ProyectoIC/
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}