name: CI/CD Pipeline para Proyecto HTML

# 1. MECANISMO DE DISPARO (Se ejecuta ante cada cambio en el repositorio)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ETAPA 1: INTEGRACIÓN CONTINUA (CI) ---
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Código: Descarga el código del repositorio al servidor de IC [cite: 13, 15]
    - name: Checkout del código
      uses: actions/checkout@v4

    # Entorno de desarrollo / Build: Configuramos Node.js para herramientas de calidad [cite: 6]
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Build Automatizada: Instala el entorno base definido en el package.json [cite: 6, 16]
    - name: Instalar dependencias (Build Local)
      run: npm install

    # Inspección de código: Valida la sintaxis del proyecto [cite: 25]
    - name: Ejecutar Linter (Inspección de código)
      run: npm run lint

    # Pruebas automatizadas: Corre los tests unitarios simulados [cite: 6, 17]
    - name: Ejecutar Pruebas Automatizadas
      run: npm test

  # --- ETAPA 2: ENTREGA CONTINUA (CD) ---
  deploy:
    [cite_start]needs: build-and-test # Bloqueo de seguridad: Solo despliega si la etapa de CI dio verde [cite: 16]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    # Despliegue en Entorno de Entrega (GitHub Pages como entorno de Producción) [cite: 7, 19, 22]
    - name: Desplegar en GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: . # Despliega la raíz del proyecto donde está tu index.html
        branch: gh-pages # Rama destino para el servidor web nativo